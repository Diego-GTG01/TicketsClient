<div class="login-container">
  <div class="login-card">
    <h2>Iniciar Sesión</h2>

    <form (ngSubmit)="login()">

      <div class="form-group">
        <label>Usuario</label>
        <input
          type="text"
          [(ngModel)]="usuario.username"
          name="username"
          required>
      </div>

      <div class="form-group">
        <label>Contraseña</label>
        <input
          type="password"
          [(ngModel)]="usuario.password"
          name="password"
          required>
      </div>

      <button type="submit">
        Ingresar
      </button>

      <p *ngIf="error" class="error">
        {{ error }}
      </p>

    </form>
  </div>
</div>
