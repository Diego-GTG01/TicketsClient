<div class="user-badge-container w-100 p-2 border rounded bg-light shadow-sm">
  @if (usuario) {
    <div class="d-flex align-items-center gap-2 w-100">
      <span class="fs-5 text-secondary d-flex align-items-center">
        @switch (usuario.rol) {
          @case ('Administrador') { <i class="bi bi-shield-lock-fill text-danger"></i> }
          @case ('Agente') { <i class="bi bi-headset text-success"></i> }
          @case ('Usuario') { <i class="bi bi-person-fill text-primary"></i> }
          @default { <i class="bi bi-question-circle-fill text-muted"></i> }
        }
      </span>

      <span class="fw-semibold text-dark text-nowrap">{{ usuario.nombre }}</span>
      <span class="badge bg-primary-subtle text-primary border border-primary-subtle text-nowrap">
        {{ usuario.rol }}
      </span>

      <button type="button" (click)="confirmarLogout()" class="btn btn-sm btn-outline-danger d-flex align-items-center p-1 px-2 ms-auto" title="Cerrar sesión">
        <i class="bi bi-box-arrow-right me-1"></i> Salir
      </button>
    </div>
  }
</div>
